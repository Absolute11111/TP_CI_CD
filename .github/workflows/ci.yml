  # ─── Desktop Linux (.deb) ─────────────────────────────────────────────────
  desktop-linux:
    name: Desktop Linux (.deb)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Build Desktop Linux .deb
        run: ./gradlew packageDeb --no-daemon

      - name: Upload Desktop .deb (Linux)
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-deb
          path: '**/build/compose/binaries/main/deb/*.deb'

