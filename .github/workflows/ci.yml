name: CI

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:

  # ─── Tests + APK Android ────────────────────────────────────────────────────
  test:
    name: Tests & APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Lancer les tests JVM
        env:
          PHOTOGRAPHER_API_KEY: ${{ secrets.PHOTOGRAPHER_API_KEY }}
        run: ./gradlew jvmTest --no-daemon

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: '**/build/reports/tests/'

      - name: Build Android Debug APK
        env:
          PHOTOGRAPHER_API_KEY: ${{ secrets.PHOTOGRAPHER_API_KEY }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: '**/build/outputs/apk/debug/*.apk'

